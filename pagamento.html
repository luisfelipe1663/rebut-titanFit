<link rel="stylesheet" href="pagamento.css">
<section class="conteudo-pagamento">

    <div class="pagamento-box">

        <h1 class="titulo-pagamento">Finalizar Assinatura</h1>

        <p>Preencha seus dados para concluir a contratação.</p>

        <form>

            <div class="caixa-pagamento">
                <label>E-mail</label>
                <input type="email" placeholder="seuemail@exemplo.com">
            </div>

            <div class="caixa-pagamento">
                <label>Senha</label>
                <input type="password" placeholder="********">
            </div>

            <h3 class="titulo-cartao">Dados do Cartão</h3>

            <div class="caixa-pagamento">
                <label>Nome no cartão</label>
                <input type="text" placeholder="Nome completo">
            </div>

            <div class="caixa-pagamento">
                <label>Número do cartão</label>
                <input type="text" placeholder="0000 0000 0000 0000">
            </div>

            <div class="linha-cartao">

                <div class="caixa-pagamento">
                    <label>Validade</label>
                    <input type="text" placeholder="MM/AA">
                </div>

                <div class="caixa-pagamento">
                    <label>CVV</label>
                    <input type="text" placeholder="123">
                </div>

            </div>

            <div class="caixa-pagamento">
                <label>CPF do Titular</label>
                <input type="text" placeholder="000.000.000-00">
            </div>

            <div class="resumo-plano">
                <h3>Plano Premium</h3>
                <span>R$ 99,90/mês</span>
            </div>

            <button class="btn-pagar" type="submit">
                Confirmar Pagamento
            </button>

        </form>

    </div>

</section>
